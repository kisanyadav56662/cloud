name: BUILD MY ANGULAR APP

on:
  push:
    branches: [ main ]

jobs:
   build-angular-app:
     runs-on: ubuntu-latest

     steps:
       - uses: actions/checkout@v4.2.2
       - name: setup node js
         uses: actions/setup-node@v4.2.0
         with:
             node-version: 22.x
       - name: Install Dependencies
         run: npm install
       - name: Build Angular APP
         run: npm run build

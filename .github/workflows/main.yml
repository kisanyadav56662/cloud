name: BUILD MY ANGULAR APP

on:
  push:
    branches: [ main ]

jobs:
   build-angular-app:
     runs-on: ubuntu-latest

     steps:
       - uses: actions/checkout@v7.0.0
       - name: setup node js
         uses: actions/setup-node@v6.4.0
         with:
             node-version: 22.x
       - name: Install Dependenciens
         run: npm install
       - name: Build Angular APP
         run: npm run build
